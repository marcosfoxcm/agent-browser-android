name: Build agent-browser for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android
    
    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
    
    - name: Set up Android NDK environment
      run: |
        echo "CC_aarch64_linux_android=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX_aarch64_linux_android=aarch64-linux-gnu-g++" >> $GITHUB_ENV
        echo "AR_aarch64_linux_android=aarch64-linux-gnu-ar" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
    
    - name: Build release binary for Android ARM64
      run: |
        cd cli
        cargo build --release --target aarch64-linux-android
    
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: agent-browser-android-arm64
        path: cli/target/aarch64-linux-android/release/agent-browser
        retention-days: 30
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: cli/target/aarch64-linux-android/release/agent-browser
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
